name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm pack --dry-run
      - name: Smoke-test the packaged CLI
        shell: bash
        run: |
          package=$(npm pack --silent)
          prefix="$RUNNER_TEMP/threadline-install"
          npm install --global --prefix "$prefix" "./$package"
          if [ "$RUNNER_OS" = "Windows" ]; then
            "$prefix/threadline.cmd" --demo --snapshot > /dev/null
          else
            "$prefix/bin/threadline" --demo --snapshot > /dev/null
          fi
